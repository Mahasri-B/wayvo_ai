version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: pathfinder_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pathfinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pathfinder123}
      POSTGRES_DB: ${POSTGRES_DB:-pathfinder_tn}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathfinder"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: pathfinder_chroma
    ports:
      - "8001:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE

  ollama:
    image: ollama/ollama:latest
    container_name: pathfinder_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # CPU only - no GPU flags

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pathfinder_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pathfinder}:${POSTGRES_PASSWORD:-pathfinder123}@postgres:5432/${POSTGRES_DB:-pathfinder_tn}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./chroma_data:/chroma_data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pathfinder_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000
      - REACT_APP_ORS_API_KEY=${ORS_API_KEY}
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
