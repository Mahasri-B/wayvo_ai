services:
  - type: web
    name: wayvo-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./pathfinder_tn.db
      - key: GROQ_API_KEY
        sync: false
      - key: OLLAMA_HOST
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: llama3
      - key: CHROMA_HOST
        value: localhost
      - key: CHROMA_PORT
        value: "8001"
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: wayvo-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          name: wayvo-ai-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
